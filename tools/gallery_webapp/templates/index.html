<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery Manager Filter Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <h1>Gallery Manager Filter Control</h1>
    <div id="active-meta">Loading active filter...</div>
  </header>

  <main class="layout">
    <section class="panel controls">
      <h2>Filter Controls</h2>

      <label>Collection
        <select id="collection"></select>
      </label>

      <label>General term (subject/location/tag/etc)
        <input id="any_term" placeholder="e.g. istanbul or waterfront">
      </label>

      <div class="row2">
        <label>Year From
          <input id="year_from" type="number" placeholder="e.g. 1880">
        </label>
        <label>Year To
          <input id="year_to" type="number" placeholder="e.g. 1890">
        </label>
      </div>

      <label>Subject contains
        <input id="subject" list="subjects_list" placeholder="e.g. istanbul">
        <datalist id="subjects_list"></datalist>
      </label>

      <label>Location contains
        <input id="location" list="locations_list" placeholder="e.g. turkey">
        <datalist id="locations_list"></datalist>
      </label>

      <label>Tag contains
        <input id="tag" list="tags_list" placeholder="e.g. prints and photographs division">
        <datalist id="tags_list"></datalist>
      </label>

      <label>Contributor contains
        <input id="contributor" list="contributors_list" placeholder="e.g. abdullah">
        <datalist id="contributors_list"></datalist>
      </label>

      <label>Text search (FTS)
        <input id="fts" placeholder='e.g. "golden horn" OR barracks'>
      </label>

      <div class="row2">
        <label>Result Limit
          <input id="limit" type="number" min="1" max="500" value="60">
        </label>
        <label class="checkbox">
          <input id="shuffle" type="checkbox">
          Shuffle
        </label>
      </div>

      <label class="checkbox">
        <input id="exclude_portraits" type="checkbox">
        Exclude portraits
      </label>

      <div class="actions">
        <button id="apply_btn" class="btn-primary">Apply</button>
        <button id="save_btn">Save Active Filter</button>
        <button id="load_btn">Load Active Filter</button>
        <button id="clear_btn">Clear</button>
      </div>
    </section>

    <section class="panel results">
      <div class="results-header">
        <h2>Current Selection</h2>
        <div class="results-tools">
          <div id="result_count" aria-live="polite">0 results</div>
          <div class="view-toggle" role="group" aria-label="Result display mode">
            <button id="gallery_view_btn" class="is-active" type="button">Gallery</button>
            <button id="master_view_btn" type="button">Master Image</button>
          </div>
        </div>
      </div>

      <div id="active_chips" class="chips"></div>

      <div id="results_grid" class="results-grid"></div>

      <section id="master_view" class="master-view is-hidden" aria-live="polite">
        <figure class="master-stage">
          <img id="master_image" alt="master image preview">
          <figcaption id="master_empty" class="master-empty">No image-ready items found.</figcaption>
        </figure>
        <div class="master-meta">
          <h3 id="master_title">No item selected</h3>
          <p id="master_subtitle">Choose an image-ready record from your current search results.</p>
          <a id="master_link" href="#" target="_blank" rel="noreferrer">Open source record</a>
          <div class="master-nav">
            <button id="master_prev_btn" type="button">Previous</button>
            <span id="master_position">0 / 0</span>
            <button id="master_next_btn" type="button">Next</button>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
