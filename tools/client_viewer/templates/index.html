<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gallery Manager Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/viewer.css">
</head>
<body>
  <div class="aurora"></div>

  <header class="topbar">
    <div>
      <p class="label">Gallery Manager</p>
      <h1>Client Viewer</h1>
    </div>
    <div class="status-block">
      <div id="sync_status">sync: booting</div>
      <div id="selection_meta">selection: loading</div>
    </div>
  </header>

  <main class="stage-wrap">
    <section class="stage" id="stage">
      <img id="slide_image" alt="gallery item">
      <div id="empty_state" class="empty">No images available from active selection.</div>
    </section>

    <aside class="caption">
      <h2 id="item_title">Waiting for data...</h2>
      <p id="item_subtitle">Viewer will begin when active selection includes image URLs.</p>
      <a id="item_link" href="#" target="_blank" rel="noreferrer">Open source record</a>
      <div id="filter_summary" class="filter-summary"></div>
    </aside>
  </main>

  <script>
    window.VIEWER_CONFIG = {{ viewer_config | safe }};
  </script>
  <script src="/static/viewer.js"></script>
</body>
</html>
