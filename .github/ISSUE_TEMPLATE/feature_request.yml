name: Feature request
description: Suggest an improvement for ingestion, querying, export, or automation.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Query capabilities
        - Ingestion performance
        - Metadata normalization
        - Export/reporting
        - Automation/CI
        - Documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What workflow problem are you trying to solve?
      placeholder: I need to...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: Describe your proposed approach.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Any workarounds or alternatives you've tried.

  - type: textarea
    id: examples
    attributes:
      label: Example query or output
      placeholder: Provide sample command/output if relevant.
