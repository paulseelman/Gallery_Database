name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile loc_metadata_db.py
          python -m py_compile webapp.py
          python -m py_compile tools/database_ingestor/loc_metadata_db.py
          python -m py_compile tools/gallery_webapp/webapp.py

      - name: CLI help smoke test
        run: |
          python loc_metadata_db.py --help
          python loc_metadata_db.py ingest --help
          python loc_metadata_db.py stats --help
          python loc_metadata_db.py query --help
          python webapp.py --help
